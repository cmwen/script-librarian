name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            name="msl-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags "-s -w" -o "dist/${name}${ext}" ./cmd/msl
            (cd dist && sha256sum "${name}${ext}" > "${name}${ext}.sha256")
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Native Script Librarian CLI release $GITHUB_REF_NAME"
